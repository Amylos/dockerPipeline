name: Build and Deploy Apache

on:
  push:
    branches: [ main ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repo
        uses: actions/checkout@v3

      # 2️⃣ Docker login
      - name: Docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3️⃣ Build image
      - name: Build Docker image
        run: docker build -t myapache:${{ github.sha }} ./apache

      # 4️⃣ Tag image
      - name: Tag image
        run: docker tag myapache:${{ github.sha }} mydockerhubuser/myapache:latest

      # 5️⃣ Push image
      - name: Push image
        run: docker push mydockerhubuser/myapache:latest

      # 6️⃣ Optional: Test container locally in the runner
      - name: Run container
        run: docker run -d -p 8080:80 --name apache-test mydockerhubuser/myapache:latest

      # 7️⃣ Optional: Test site
      - name: Test site
        run: curl http://localhost:8080