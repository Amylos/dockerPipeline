name: Build and Deploy Nginx

on:
  push:
    branches: [ main ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout code
    - name: Checkout repo
      uses: actions/checkout@v3

    # 2️⃣ Login to Docker Hub
    - name: Docker login
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 3️⃣ Build image
    - name: Build Docker image
      run: docker build -t mynginx:${{ github.sha }} .

    # 4️⃣ Tag image
    - name: Tag image
      run: docker tag mynginx:${{ github.sha }} amylos/mynginx:latest

    # 5️⃣ Push image
    - name: Push image
      run: docker push amylos/mynginx:latest

    # 6️⃣ Run container
    - name: Run container
      run: docker run -d -p 8080:80 --name nginx-test amylos/mynginx:latest

    # 7️⃣ Get URL
    - name: Show URL
      run: |
        echo "Application is available at:"
        echo "http://localhost:8080"

    # 8️⃣ Test the site
    - name: Test site
      run: curl http://localhost:8080